# =============================================================================
# LVGL MAIN PAGE - Top-layer HUD and button grid
# =============================================================================
# Defines the primary UI: a top-layer overlay with temperature and clock
# labels, and the main page with a flex-wrap grid of 20 button widgets.
# Buttons start hidden; sensors.yaml unhides active ones at boot.
# =============================================================================

lvgl:
  # ---------------------------------------------------------------------------
  # Top layer (always visible above all pages)
  # ---------------------------------------------------------------------------
  top_layer:
    widgets:
      # Indoor/outdoor temperature (top-left)
      - label:
          text: "-° / -°"
          id: temperatures
          text_font: clockbar_font
          align: top_left
          x: 8
          y: 8
          text_color: 0xFFFFFF
          hidden: true

      # Clock (top-center, updated every minute by time.yaml)
      - label:
          text: "--:--"
          id: display_time
          text_font: clockbar_font
          align: top_mid
          x: 0
          y: 8
          text_align: center
          text_color: 0xFFFFFF
          hidden: true

  # ---------------------------------------------------------------------------
  # Main page (hero image, then flex-wrap grid of button widgets)
  # ---------------------------------------------------------------------------
  pages:
    - id: main_page
      layout:
        type: flex
        flex_flow: COLUMN
        flex_align_cross: stretch
        pad_row: 8
      width: 100%
      bg_color: Black
      bg_opa: cover
      pad_top: 42
      pad_bottom: 5
      pad_left: 5
      pad_right: 5
      scrollable: true

      widgets:
        - obj:
            width: 100%
            height: SIZE_CONTENT
            bg_opa: TRANSP
            border_width: 0
            pad_all: 0
            scrollable: false
            layout:
              type: flex
              flex_flow: column_wrap
              pad_row: 10
              pad_column: 10
            widgets:
              - !include { file: button_widget.yaml, vars: { num: "1" } }
              - !include { file: button_widget.yaml, vars: { num: "2" } }
              - !include { file: button_widget.yaml, vars: { num: "3" } }
              - !include { file: button_widget.yaml, vars: { num: "4" } }
              - !include { file: button_widget.yaml, vars: { num: "5" } }
              - !include { file: button_widget.yaml, vars: { num: "6" } }
              - !include { file: button_widget.yaml, vars: { num: "7" } }
              - !include { file: button_widget.yaml, vars: { num: "8" } }
              - !include { file: button_widget.yaml, vars: { num: "9" } }
              - !include { file: button_widget.yaml, vars: { num: "10" } }
              - !include { file: button_widget.yaml, vars: { num: "11" } }
              - !include { file: button_widget.yaml, vars: { num: "12" } }
              - !include { file: button_widget.yaml, vars: { num: "13" } }
              - !include { file: button_widget.yaml, vars: { num: "14" } }
              - !include { file: button_widget.yaml, vars: { num: "15" } }
              - !include { file: button_widget.yaml, vars: { num: "16" } }
              - !include { file: button_widget.yaml, vars: { num: "17" } }
              - !include { file: button_widget.yaml, vars: { num: "18" } }
              - !include { file: button_widget.yaml, vars: { num: "19" } }
              - !include { file: button_widget.yaml, vars: { num: "20" } }
