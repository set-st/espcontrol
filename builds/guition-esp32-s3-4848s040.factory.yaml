# =============================================================================
# FACTORY BUILD - Guition ESP32-S3-4848S040 (4" square)
# =============================================================================
# Factory image: www.js bundled inline for first-boot web UI access.
# =============================================================================

substitutions:
  firmware_version: "0.0.0"

packages:
  core: !include guition-esp32-s3-4848s040.yaml

esphome:
  project:
    name: set-st.espcontrol
    version: "${firmware_version}"

dashboard_import:
  package_import_url: github://set-st/espcontrol/devices/guition-esp32-s3-4848s040/esphome.yaml@main

web_server:
  port: 80
  version: 3
  js_url: ""
  js_include: "../docs/public/webserver/guition-esp32-s3-4848s040/www.js"
