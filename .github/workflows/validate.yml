name: Validate

on:
  pull_request:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check-icons:
    name: Check Icon Sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Verify icon data is in sync
        run: python3 scripts/sync_icons.py --check

  validate-docs:
    name: Validate Docs Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run docs:build
